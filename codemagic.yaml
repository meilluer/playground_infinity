workflows:
  android-manual-build:
    name: Android Manual Build

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true

    scripts:
      - name: Make gradlew executable
        script: chmod +x ./gradlew

      - name: Build release APK
        script: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
          echo "Build version: $(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '\"')"
          echo "Build code: $(grep "versionCode" app/build.gradle | awk '{print $2}')"

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt
